# Tell Kafka clients to give up quickly instead of retrying for 17 minutes
spring.kafka.properties.reconnect.backoff.ms=100
spring.kafka.properties.reconnect.backoff.max.ms=1000
spring.kafka.properties.max.block.ms=5000
spring.kafka.admin.properties.max.block.ms=5000

# Use the system temp directory + a random subfolder to avoid lock contention
spring.kafka.streams.state-dir=${java.io.tmpdir}/roadrunner-test/${random.uuid}

# Give the test stream a unique ID so it doesn't try to join a real group
spring.kafka.streams.application-id=roadrunner-playback-test-${random.uuid}

# Ensure the streams fail fast if there's an issue
spring.kafka.streams.properties.max.block.ms=5000

# Ensure the AdminClient used by MetadataService doesn't hang the context
spring.kafka.admin.properties.request.timeout.ms=5000

# Force Instants to be serialized as ISO strings or timestamps in millis
spring.jackson.serialization.write-dates-as-timestamps=false