name: Validate Backend Build

on:
  push:
    branches:
      - '**'
    paths:
      - 'apps/roadrunner/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/roadrunner/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn -B package --file apps/roadrunner/pom.xml

      - name: Archive Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: apps/roadrunner/target/surefire-reports/
