name: Validate Frontend Build

on:
  push:
    paths:
      - 'apps/roadrunner-view/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/roadrunner-view/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/roadrunner-view
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/roadrunner-view/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build --if-present
