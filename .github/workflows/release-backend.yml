name: Release Backend to DockerHub

on:
  push:
    tags:
      - 'roadrunner-v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Extract release version
        id: release_version
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          VERSION=${TAG_NAME#roadrunner-v}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Maven Package
        run: mvn -B package -DskipTests --file apps/roadrunner/pom.xml

      - name: Docker Login
        uses: docker/login-action@v2.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v3.0.0
        with:
          context: ./apps/roadrunner
          file: ./apps/roadrunner/Dockerfile
          push: true
          tags: |
            tarterware/roadrunner:latest
            tarterware/roadrunner:${{ steps.release_version.outputs.version }}
